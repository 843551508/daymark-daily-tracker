ServerTokens Prod
ServerSignature Off

<Directory /var/www/html>
    Options -Indexes
    AllowOverride None
    Require all granted
</Directory>

<DirectoryMatch "^/var/www/html/(data|docs|\.git|\.github)(/|$)">
    Require all denied
</DirectoryMatch>

<FilesMatch "^(?:Dockerfile|docker-compose\.ya?ml|\.dockerignore|\.gitignore|\.gitattributes|README\.md|CONTRIBUTING\.md|SECURITY\.md|LICENSE)$">
    Require all denied
</FilesMatch>
